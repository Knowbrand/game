<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 3</title>
<style>
:root {
  --bg-1: #f5f1ea;
  --bg-2: #ebe3d6;
  --card: #fffdf8;
  --card-border: #d7c8b2;
  --text: #2f2521;
  --muted: #7d6b61;
  --accent: #7c6758;
  --accent-dark: #5f4d41;
  --shadow: 0 22px 55px rgba(83, 63, 49, 0.12);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-family: "Segoe UI", Tahoma, sans-serif;
  color: var(--text);
  background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
}

.card {
  width: 100%;
  max-width: 760px;
  padding: 32px;
  border-radius: 28px;
  border: 1px solid var(--card-border);
  background: var(--card);
  box-shadow: var(--shadow);
}

.level-tag {
  display: inline-block;
  margin-bottom: 22px;
  padding: 8px 16px;
  border-radius: 999px;
  background: #f3ece4;
  color: var(--accent-dark);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.title {
  margin-bottom: 14px;
  font-size: clamp(1.9rem, 4vw, 2.8rem);
  line-height: 1.1;
  font-family: Georgia, "Times New Roman", serif;
}

.intro {
  margin-bottom: 24px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
}

.story-box {
  min-height: 290px;
  padding: 24px;
  border: 1px solid #e5d9ca;
  border-radius: 22px;
  background: #fffaf4;
}

.story-text {
  font-size: 18px;
  line-height: 1.9;
  color: var(--text);
  white-space: pre-line;
}

.cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  margin-left: 4px;
  background: var(--accent);
  vertical-align: bottom;
  animation: blink 1s infinite;
}

.actions {
  margin-top: 24px;
  text-align: center;
}

.continue-btn {
  display: none;
  padding: 14px 28px;
  border: 1px solid var(--accent);
  border-radius: 999px;
  background: transparent;
  color: var(--accent);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
}

.continue-btn:hover {
  transform: translateY(-2px);
  background: var(--accent);
  color: #fff;
}

@keyframes blink {
  0%,
  50%,
  100% {
    opacity: 1;
  }

  25%,
  75% {
    opacity: 0;
  }
}

@media (max-width: 640px) {
  .card {
    padding: 24px 18px;
    border-radius: 22px;
  }

  .story-box {
    min-height: 340px;
    padding: 18px;
  }

  .story-text {
    font-size: 17px;
  }

  .continue-btn {
    width: 100%;
  }
}
</style>
</head>
<body>
  <main class="card">
    <div class="level-tag">Level 3</div>
    <h1 class="title">Read this slowly.</h1>
    <p class="intro">
      This part is not a challenge. It is a reminder.
    </p>

    <div class="story-box">
      <div class="story-text" id="story"></div>
    </div>

    <div class="actions">
      <button class="continue-btn" id="continueBtn" onclick="goNext()">Continue</button>
    </div>
  </main>

<script>
if (sessionStorage.getItem("nameSelected") !== "AK") {
  window.location.href = "index.html";
}

const storyContent = `It always started with hesitation.

Not because you were weak.
But because you cared.

You think deeply.
You feel intensely.
You question yourself more than you question the world.

And maybe...
you never wanted people to see that side.

But here is the truth.

Hesitation is not weakness.
It is awareness.

And awareness becomes strength
the moment you decide to move anyway.

This is not the end of your story.

It is just the part
where you stop doubting
and start walking forward.

The future does not wait.
It unfolds.

And you are already ready for it.`;

const storyElement = document.getElementById("story");
const continueBtn = document.getElementById("continueBtn");

let index = 0;
const speed = 28;

function renderStory() {
  const visibleText = storyContent.slice(0, index);
  const isFinished = index >= storyContent.length;
  storyElement.innerHTML = isFinished
    ? visibleText
    : `${visibleText}<span class="cursor"></span>`;
}

function typeWriter() {
  if (index <= storyContent.length) {
    renderStory();
    index += 1;

    if (index <= storyContent.length) {
      setTimeout(typeWriter, speed);
    } else {
      continueBtn.style.display = "inline-block";
    }
  }
}

typeWriter();

function goNext() {
  document.body.style.opacity = "0";
  document.body.style.transition = "opacity 0.5s ease";

  setTimeout(() => {
    window.location.href = "instructions.html";
  }, 550);
}
</script>
</body>
</html>
