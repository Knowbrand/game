<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Choice</title>
<style>
:root {
  --bg-1: #1b211e;
  --bg-2: #101412;
  --card: #171d1a;
  --card-border: #314038;
  --text: #f4f3ee;
  --muted: #b7beb8;
  --accent: #8aa08f;
  --accent-soft: #232c27;
  --gold: #b79a56;
  --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-family: "Segoe UI", Tahoma, sans-serif;
  color: var(--text);
  background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
}

.card {
  width: 100%;
  max-width: 860px;
  padding: 34px;
  border: 1px solid var(--card-border);
  border-radius: 30px;
  background: var(--card);
  box-shadow: var(--shadow);
  text-align: center;
}

.level-tag {
  display: inline-block;
  margin-bottom: 20px;
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.title {
  margin-bottom: 12px;
  font-size: clamp(2rem, 4vw, 3rem);
  line-height: 1.1;
  font-family: Georgia, "Times New Roman", serif;
}

.subtext {
  max-width: 560px;
  margin: 0 auto 32px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
}

.doors {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 24px;
}

.door-option {
  border: 1px solid #3d4b44;
  border-radius: 24px;
  background: #1d2521;
  padding: 24px 20px 20px;
  cursor: pointer;
  transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
}

.door-option:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  background: #222b26;
}

.door {
  width: 150px;
  height: 250px;
  margin: 0 auto 18px;
  border-radius: 10px;
  border: 2px solid #46564d;
  background: linear-gradient(145deg, #242c28, #111614);
  position: relative;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
}

.door::before {
  content: "";
  position: absolute;
  top: 16px;
  left: 16px;
  right: 16px;
  bottom: 16px;
  border: 1px solid #53645a;
  border-radius: 6px;
}

.handle {
  position: absolute;
  right: 18px;
  top: 50%;
  width: 10px;
  height: 34px;
  border-radius: 999px;
  background: linear-gradient(180deg, #ccb06d, var(--gold));
  transform: translateY(-50%);
}

.door-label {
  margin-bottom: 8px;
  font-size: 20px;
  font-weight: 700;
  font-family: Georgia, "Times New Roman", serif;
}

.door-copy {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.6;
}

.fade-out {
  animation: fadeOut 0.7s ease forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(0.97);
  }
}

@media (max-width: 700px) {
  .card {
    padding: 24px 18px;
    border-radius: 22px;
  }

  .doors {
    grid-template-columns: 1fr;
  }

  .door {
    width: 140px;
    height: 220px;
  }
}
</style>
</head>
<body>
  <main class="card">
    <div class="level-tag">Next Step</div>
    <h1 class="title">Two doors. One decision.</h1>
    <p class="subtext">
      There is no perfect answer here. Just one path that feels unfamiliar and one path that feels safe.
    </p>

    <div class="doors">
      <div class="door-option" onclick="chooseDoor('left')">
        <div class="door">
          <div class="handle"></div>
        </div>
        <div class="door-label">Unknown Risk</div>
        <div class="door-copy">A choice that asks for courage before certainty.</div>
      </div>

      <div class="door-option" onclick="chooseDoor('right')">
        <div class="door">
          <div class="handle"></div>
        </div>
        <div class="door-label">Familiar Future</div>
        <div class="door-copy">A path that feels easier because you already know its shape.</div>
      </div>
    </div>
  </main>

<script>
function chooseDoor(side) {
  document.querySelector(".card").classList.add("fade-out");

  setTimeout(() => {
    if (side === "left") {
      window.location.href = "left.html";
    } else {
      window.location.href = "right.html";
    }
  }, 700);
}
</script>
</body>
</html>
