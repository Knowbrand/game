
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 1</title>
<style>
:root {
  --bg-cream: #f8efe4;
  --bg-rose: #f6d8da;
  --panel: rgba(255, 252, 248, 0.82);
  --panel-border: rgba(126, 97, 87, 0.2);
  --text-main: #2f2624;
  --text-soft: #7b6a67;
  --accent: #8f6f67;
  --accent-strong: #6c4f48;
  --accent-glow: rgba(143, 111, 103, 0.22);
  --wrong-bg: #ffe2e4;
  --wrong-border: #df7280;
  --wrong-text: #8c3244;
  --success: #6f8f72;
  --success-strong: #54725a;
  --shadow: 0 24px 70px rgba(76, 48, 40, 0.14);
}

<style>
* {
  margin: 0;
  padding: 0;
}

body {
  font-family: "Segoe UI", sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #f5f1ea, #ffffff);
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 28px;
  overflow: hidden;
  font-family: Georgia, "Times New Roman", serif;
  color: var(--text-main);
  background:
    radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 34%),
    radial-gradient(circle at 85% 18%, rgba(255, 223, 214, 0.85), transparent 23%),
    linear-gradient(135deg, var(--bg-cream), #fffaf4 48%, #f7e4e6 100%);
  transition: opacity 0.8s ease;
}

body::before,
body::after {
  content: "";
  position: fixed;
  width: 360px;
  height: 360px;
  border-radius: 50%;
  z-index: 0;
  filter: blur(8px);
  pointer-events: none;
}

body::before {
  top: -110px;
  left: -70px;
  background: rgba(255, 255, 255, 0.45);
}

body::after {
  right: -90px;
  bottom: -120px;
  background: rgba(246, 216, 218, 0.42);
}

.game-card {
  width: 90%;
  max-width: 750px;
  background: #ffffff;
  padding: 60px 40px;
  border-radius: 30px;
  border: 2px solid #6f8f72;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
  text-align: center;
.scene {
  width: min(900px, 100%);
  position: relative;
  animation: fadeIn 1s ease forwards;
  z-index: 1;
  animation: floatIn 0.9s ease-out forwards;
}

.level-number {
.sparkle {
  position: absolute;
  top: -22px;
  left: 35px;
  width: 50px;
  height: 50px;
  background: #6f8f72;
  color: white;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  background: rgba(255, 255, 255, 0.85);
  box-shadow: 0 0 16px rgba(255, 255, 255, 0.8);
  animation: drift 5s ease-in-out infinite;
}

.sparkle.one {
  top: 8%;
  left: 8%;
}

.sparkle.two {
  top: 16%;
  right: 12%;
  animation-delay: 1.2s;
}

.sparkle.three {
  bottom: 12%;
  left: 14%;
  animation-delay: 2.1s;
}

.game-card {
  position: relative;
  padding: 72px 42px 40px;
  border-radius: 34px;
  background: var(--panel);
  backdrop-filter: blur(20px);
  border: 1px solid var(--panel-border);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.game-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.48), transparent 44%),
    radial-gradient(circle at top right, rgba(248, 219, 212, 0.55), transparent 26%);
  pointer-events: none;
}

.level-pill {
  position: absolute;
  top: 26px;
  left: 26px;
  display: inline-flex;
  align-items: center;
  font-weight: bold;
  font-size: 18px;
  gap: 10px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.74);
  border: 1px solid rgba(143, 111, 103, 0.18);
  box-shadow: 0 10px 24px rgba(120, 82, 74, 0.08);
  font-family: "Segoe UI", sans-serif;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-strong);
}

.level-number {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  color: #fff;
  font-weight: 700;
  letter-spacing: 0;
}

.intro {
  margin-bottom: 12px;
  font-family: "Segoe UI", sans-serif;
  font-size: 13px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-soft);
}

.question {
  font-size: 28px;
  margin-bottom: 50px;
  color: #2e2e2e;
  max-width: 620px;
  margin: 0 auto 18px;
  font-size: clamp(2rem, 4vw, 3.3rem);
  line-height: 1.05;
}

.subtext {
  max-width: 560px;
  margin: 0 auto 34px;
  font-family: "Segoe UI", sans-serif;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-soft);
}

.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}

.option {
  padding: 18px;
  border-radius: 15px;
  border: 2px solid #6f8f72;
  background: transparent;
  position: relative;
  padding: 20px 18px;
  border: 1px solid rgba(143, 111, 103, 0.3);
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.66);
  color: var(--text-main);
  cursor: pointer;
  font-family: "Segoe UI", sans-serif;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 600;
  letter-spacing: 0.01em;
  transition:
    transform 0.28s ease,
    background 0.28s ease,
    border-color 0.28s ease,
    box-shadow 0.28s ease,
    color 0.28s ease;
}

.option span {
  display: block;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 8px;
}

.option:hover {
  background: #6f8f72;
  color: white;
  transform: translateY(-4px);
.option:hover:not(:disabled) {
  transform: translateY(-5px) scale(1.01);
  border-color: rgba(143, 111, 103, 0.55);
  background: rgba(255, 250, 246, 0.95);
  box-shadow: 0 16px 28px rgba(143, 111, 103, 0.15);
}

.wrong {
  background: #f8d7da !important;
  border-color: #d9534f !important;
  color: #721c24 !important;
.option:disabled {
  cursor: default;
}

.correct {
  background: #6f8f72 !important;
  color: white !important;
.option.wrong {
  background: var(--wrong-bg) !important;
  border-color: var(--wrong-border) !important;
  color: var(--wrong-text) !important;
  animation: shake 0.45s ease;
}

.option.wrong span {
  color: var(--wrong-text) !important;
}

.option.correct {
  background: linear-gradient(135deg, var(--success), var(--success-strong)) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 18px 34px rgba(84, 114, 90, 0.3);
}

.option.correct span {
  color: rgba(255, 255, 255, 0.76) !important;
}

.feedback {
  margin-top: 35px;
  min-height: 52px;
  margin-top: 28px;
  display: grid;
  place-items: center;
  font-family: "Segoe UI", sans-serif;
  font-size: 15px;
  color: #777;
  min-height: 20px;
  transition: opacity 0.3s ease;
  color: var(--text-soft);
}

.feedback.show {
  animation: messagePop 0.35s ease;
}

.feedback-badge {
  padding: 12px 18px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.74);
  border: 1px solid rgba(143, 111, 103, 0.14);
  box-shadow: 0 10px 24px rgba(120, 82, 74, 0.06);
}

.footer-note {
  margin-top: 8px;
  font-family: "Segoe UI", sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(123, 106, 103, 0.76);
}

@keyframes fadeIn {
@keyframes floatIn {
  from {
    opacity: 0;
    transform: translateY(20px);
    transform: translateY(26px) scale(0.98);
  }

  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes drift {
  0%,
  100% {
    transform: translateY(0) scale(1);
    opacity: 0.7;
  }

  50% {
    transform: translateY(-14px) scale(1.18);
    opacity: 1;
  }
}

@keyframes shake {
  0%,
  100% {
    transform: translateX(0);
  }

  25% {
    transform: translateX(-6px);
  }

  75% {
    transform: translateX(6px);
  }
}

@keyframes messagePop {
  from {
    opacity: 0;
    transform: translateY(8px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 720px) {
  body {
    padding: 16px;
  }

  .game-card {
    padding: 84px 22px 28px;
    border-radius: 28px;
  }

  .options {
    grid-template-columns: 1fr;
  }

  .question {
    font-size: clamp(1.8rem, 8vw, 2.6rem);
  }

  .subtext {
    font-size: 14px;
    margin-bottom: 24px;
  }

  .level-pill {
    top: 18px;
    left: 18px;
  }
}
</style>
</head>

<body>
  <div class="scene">
    <div class="sparkle one"></div>
    <div class="sparkle two"></div>
    <div class="sparkle three"></div>

<div class="game-card">
  <div class="level-number">1</div>
    <div class="game-card">
      <div class="level-pill">
        <div class="level-number">1</div>
        <div>First Clue</div>
      </div>

  <div class="question">
    What is your real name?
  </div>
      <div class="intro">A tiny checkpoint before the next page</div>

  <div class="options">
    <button class="option" onclick="checkAnswer(this, false)">1. akansha</button>
    <button class="option" onclick="checkAnswer(this, false)">2. aakanshaa</button>
    <button class="option" onclick="checkAnswer(this, false)">3. aakansha</button>
    <button class="option" onclick="checkAnswer(this, true)">4. AK</button>
      <h1 class="question">What is your real name?</h1>

      <p class="subtext">
        Only one answer unlocks the next level. Pick carefully, because the right one knows exactly who it is.
      </p>

      <div class="options">
        <button class="option" onclick="checkAnswer(this, false)">
          <span>Option 01</span>
          akansha
        </button>
        <button class="option" onclick="checkAnswer(this, false)">
          <span>Option 02</span>
          aakanshaa
        </button>
        <button class="option" onclick="checkAnswer(this, false)">
          <span>Option 03</span>
          aakansha
        </button>
        <button class="option" onclick="checkAnswer(this, true)">
          <span>Option 04</span>
          AK
        </button>
      </div>

      <div class="feedback" id="feedback"></div>
      <div class="footer-note">Level one should feel easy. The next one does not have to.</div>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
</div>
<script>
function setFeedback(message) {
  const feedback = document.getElementById("feedback");
  feedback.innerHTML = message ? `<div class="feedback-badge">${message}</div>` : "";
  feedback.classList.remove("show");
  void feedback.offsetWidth;
  feedback.classList.add("show");
}

<script>
function checkAnswer(button, isCorrect) {
  const buttons = document.querySelectorAll(".option");
  const feedback = document.getElementById("feedback");

  buttons.forEach((btn) => {
    btn.disabled = true;

  if (isCorrect) {
    button.classList.add("correct");
    feedback.innerText = "Access Granted.";
    setFeedback("Access granted. Saving your answer and opening the next level...");

    sessionStorage.setItem("nameSelected", "AK");

    setTimeout(() => {
      document.body.style.opacity = "0";
      document.body.style.transition = "opacity 0.6s ease";
    }, 800);
    }, 900);

    setTimeout(() => {
      window.location.href = "level2.html";
    }, 1400);
    }, 1650);
  } else {
    button.classList.add("wrong");
    feedback.innerText = "That doesn't feel right...";
    setFeedback("That one is close, but not quite right.");

    setTimeout(() => {
      buttons.forEach((btn) => {
        btn.disabled = false;
        btn.classList.remove("wrong");
      });
      feedback.innerText = "";
    }, 1200);
      document.getElementById("feedback").innerHTML = "";
    }, 1300);
  }
}
</script>

</body>
</html>
