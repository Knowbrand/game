<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 1</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #f5f1ea, #ffffff);
}

/* Game Card */
.game-card {
  width: 90%;
  max-width: 750px;
  background: #ffffff;
  padding: 60px 40px;
  border-radius: 30px;
  border: 2px solid #6f8f72;
  box-shadow: 0 30px 60px rgba(0,0,0,0.08);
  text-align: center;
  position: relative;
  animation: fadeIn 1s ease forwards;
}

/* Level Badge */
.level-number {
  position: absolute;
  top: -22px;
  left: 35px;
  width: 50px;
  height: 50px;
  background: #6f8f72;
  color: white;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 18px;
}

/* Question */
.question {
  font-size: 28px;
  margin-bottom: 50px;
  color: #2e2e2e;
}

/* Options */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.option {
  padding: 18px;
  border-radius: 15px;
  border: 2px solid #6f8f72;
  background: transparent;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.option:hover {
  background: #6f8f72;
  color: white;
  transform: translateY(-4px);
}

/* States */
.wrong {
  background: #f8d7da !important;
  border-color: #d9534f !important;
  color: #721c24 !important;
}

.correct {
  background: #6f8f72 !important;
  color: white !important;
}

.feedback {
  margin-top: 35px;
  font-size: 15px;
  color: #777;
  min-height: 20px;
  transition: opacity 0.3s ease;
}

/* Fade Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="game-card">
  <div class="level-number">1</div>

  <div class="question">
    What is your real name?
  </div>

  <div class="options">
    <button class="option" onclick="checkAnswer(this, false)">1. akansha</button>
    <button class="option" onclick="checkAnswer(this, false)">2. aakanshaa</button>
    <button class="option" onclick="checkAnswer(this, false)">3. aakansha</button>
    <button class="option" onclick="checkAnswer(this, true)">4. AK</button>
  </div>

  <div class="feedback" id="feedback"></div>
</div>

<script>
function checkAnswer(button, isCorrect) {

  const buttons = document.querySelectorAll('.option');
  const feedback = document.getElementById("feedback");

  // Disable all buttons
  buttons.forEach(btn => btn.disabled = true);

  if (isCorrect) {

    button.classList.add('correct');
    feedback.innerText = "Access Granted.";

    // Store selection
    sessionStorage.setItem("nameSelected", "AK");

    // Smooth transition
    setTimeout(() => {
      document.body.style.opacity = "0";
      document.body.style.transition = "opacity 0.6s ease";
    }, 800);

    setTimeout(() => {
      window.location.href = "level2.html";
    }, 1400);

  } else {

    button.classList.add('wrong');
    feedback.innerText = "That doesn't feel right...";

    setTimeout(() => {
      buttons.forEach(btn => {
        btn.disabled = false;
        btn.classList.remove('wrong');
      });
      feedback.innerText = "";
    }, 1200);
  }
}
</script>

</body>
</html>
