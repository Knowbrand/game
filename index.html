<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 1</title>
<style>
:root {
  --bg-1: #f8f3ee;
  --bg-2: #f2e0dd;
  --card: #fffdf9;
  --card-border: #d8c2bd;
  --text: #2f2523;
  --muted: #7b6763;
  --accent: #7f6a64;
  --accent-dark: #644f49;
  --correct: #6f8f72;
  --correct-dark: #557058;
  --wrong-bg: #ffe3e5;
  --wrong-border: #de7e88;
  --wrong-text: #8d3341;
  --shadow: 0 20px 50px rgba(92, 62, 54, 0.12);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-family: "Segoe UI", Tahoma, sans-serif;
  color: var(--text);
  background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
}

.card {
  width: 100%;
  max-width: 720px;
  padding: 32px;
  border: 1px solid var(--card-border);
  border-radius: 28px;
  background: var(--card);
  box-shadow: var(--shadow);
  text-align: center;
}

.level-tag {
  display: inline-block;
  margin-bottom: 20px;
  padding: 8px 16px;
  border-radius: 999px;
  background: #f3ebe8;
  color: var(--accent-dark);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.question {
  margin-bottom: 14px;
  font-size: clamp(2rem, 4vw, 3rem);
  line-height: 1.1;
  font-family: Georgia, "Times New Roman", serif;
}

.subtext {
  max-width: 520px;
  margin: 0 auto 28px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
}

.options {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.option {
  padding: 18px;
  border: 1px solid var(--card-border);
  border-radius: 18px;
  background: #fff;
  color: var(--text);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
}

.option:hover:not(:disabled) {
  transform: translateY(-2px);
  border-color: var(--accent);
  background: #f8f1ef;
}

.option:disabled {
  cursor: default;
}

.option.correct {
  background: linear-gradient(135deg, var(--correct), var(--correct-dark));
  border-color: var(--correct-dark);
  color: #fff;
}

.option.wrong {
  background: var(--wrong-bg);
  border-color: var(--wrong-border);
  color: var(--wrong-text);
}

.feedback {
  min-height: 28px;
  margin-top: 22px;
  color: var(--muted);
  font-size: 15px;
  font-weight: 600;
}

.note {
  margin-top: 10px;
  color: var(--muted);
  font-size: 13px;
}

@media (max-width: 640px) {
  .card {
    padding: 24px 18px;
    border-radius: 22px;
  }

  .options {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
  <main class="card">
    <div class="level-tag">Level 1</div>

    <h1 class="question">What is your real name?</h1>

    <p class="subtext">
      Pick the one that feels right. Only the correct answer unlocks the next page.
    </p>

    <div class="options">
      <button class="option" onclick="checkAnswer(this, false)">1. akansha</button>
      <button class="option" onclick="checkAnswer(this, false)">2. aakanshaa</button>
      <button class="option" onclick="checkAnswer(this, false)">3. aakansha</button>
      <button class="option" onclick="checkAnswer(this, true)">4. AK</button>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="note">A simple first clue.</div>
  </main>

<script>
function checkAnswer(button, isCorrect) {
  const buttons = document.querySelectorAll(".option");
  const feedback = document.getElementById("feedback");

  buttons.forEach((btn) => {
    btn.disabled = true;
  });

  if (isCorrect) {
    button.classList.add("correct");
    feedback.textContent = "Access granted.";
    sessionStorage.setItem("nameSelected", "AK");

    setTimeout(() => {
      document.body.style.opacity = "0";
      document.body.style.transition = "opacity 0.5s ease";
    }, 700);

    setTimeout(() => {
      window.location.href = "level2.html";
    }, 1300);
  } else {
    button.classList.add("wrong");
    feedback.textContent = "That doesn't feel right.";

    setTimeout(() => {
      buttons.forEach((btn) => {
        btn.disabled = false;
        btn.classList.remove("wrong");
      });
      feedback.textContent = "";
    }, 1100);
  }
}
</script>
</body>
</html>
