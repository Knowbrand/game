<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 1</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #f5f1ea, #ffffff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Main Game Card */
.game-card {
  width: 90%;
  max-width: 750px;
  background: white;
  padding: 60px 40px;
  border-radius: 25px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.08);
  border: 2px solid #6f8f72;
  text-align: center;
  position: relative;
}

/* Level Circle */
.level-number {
  position: absolute;
  top: -20px;
  left: 30px;
  background: #6f8f72;
  color: white;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
}

/* Question */
.question {
  font-size: 26px;
  margin-bottom: 50px;
  color: #2e2e2e;
}

/* Options */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.option {
  padding: 18px;
  border-radius: 15px;
  border: 2px solid #6f8f72;
  background: transparent;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.option:hover {
  background: #6f8f72;
  color: white;
  transform: translateY(-4px);
}

/* Wrong selection */
.wrong {
  background: #f8d7da !important;
  border-color: #d9534f !important;
  color: #721c24 !important;
}

/* Correct selection */
.correct {
  background: #6f8f72 !important;
  color: white !important;
}

.feedback {
  margin-top: 30px;
  font-size: 15px;
  color: #777;
  min-height: 20px;
}
</style>
</head>

<body>

<div class="game-card">
  <div class="level-number">1</div>

  <div class="question">
    What is your real name?
  </div>

  <div class="options">
    <button class="option" onclick="checkAnswer(this, false)">1. akansha</button>
    <button class="option" onclick="checkAnswer(this, false)">2. aakanshaa</button>
    <button class="option" onclick="checkAnswer(this, false)">3. aakansha</button>
    <button class="option" onclick="checkAnswer(this, true)">4. AK</button>
  </div>

  <div class="feedback" id="feedback"></div>
</div>

<script>
function checkAnswer(button, isCorrect) {

  const buttons = document.querySelectorAll('.option');
  buttons.forEach(btn => btn.disabled = true);

  if (isCorrect) {
    button.classList.add('correct');
    document.getElementById("feedback").innerText = "Access Granted.";

    setTimeout(() => {
      window.location.href = "level2.html";
    }, 1200);

  } else {
    button.classList.add('wrong');
    document.getElementById("feedback").innerText = "That doesn't feel right...";

    setTimeout(() => {
      buttons.forEach(btn => {
        btn.disabled = false;
        btn.classList.remove('wrong');
      });
      document.getElementById("feedback").innerText = "";
    }, 1200);
  }
}
</script>

</body>
</html>
