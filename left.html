<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Left Door</title>
<style>
:root {
  --bg-1: #1a1d1b;
  --bg-2: #101211;
  --card: #171a18;
  --card-border: #415147;
  --text: #f3f1eb;
  --muted: #c0c6c0;
  --accent: #7f9a84;
  --accent-dark: #65806a;
  --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-family: "Segoe UI", Tahoma, sans-serif;
  color: var(--text);
  background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
}

.card {
  width: 100%;
  max-width: 760px;
  padding: 34px;
  border: 1px solid var(--card-border);
  border-radius: 28px;
  background: var(--card);
  box-shadow: var(--shadow);
  text-align: center;
}

.level-tag {
  display: inline-block;
  margin-bottom: 20px;
  padding: 8px 16px;
  border-radius: 999px;
  background: #202622;
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

h1 {
  margin-bottom: 20px;
  font-size: clamp(2rem, 4vw, 2.9rem);
  line-height: 1.1;
  font-family: Georgia, "Times New Roman", serif;
}

.copy {
  color: var(--muted);
  font-size: 17px;
  line-height: 1.8;
}

.highlight {
  margin-top: 24px;
  padding: 20px;
  border: 1px solid #4d5d53;
  border-radius: 20px;
  background: #1d211f;
  color: var(--text);
  font-size: 17px;
  line-height: 1.8;
  font-weight: 600;
}

.actions {
  margin-top: 28px;
}

button {
  padding: 14px 28px;
  border: 1px solid var(--accent);
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  background: var(--accent-dark);
}

@media (max-width: 640px) {
  .card {
    padding: 24px 18px;
    border-radius: 22px;
  }
}
</style>
</head>
<body>
  <main class="card">
    <div class="level-tag">Left Door</div>
    <h1>Risk Accepted.</h1>

    <p class="copy">
      You were ready to lose it all.
      <br><br>
      For something better.
      <br><br>
      But listen carefully...
    </p>

    <div class="highlight">
      Dumboo you are!!!!
      <br>
      Nothing bad can or will ever happen to you.
      <br>
      Go choose the right door.
    </div>

    <div class="actions">
      <button onclick="window.location.href='instructions.html'">Go Back</button>
    </div>
  </main>
</body>
</html>
