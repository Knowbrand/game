<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 4 – The Choice</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #f5f1e6, #e8f0e3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    text-align: center;
    max-width: 750px;
    padding: 60px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 1.5s ease forwards;
}

h1 {
    font-size: 32px;
    margin-bottom: 30px;
    color: #2f5d3a;
    letter-spacing: 1px;
}

p {
    font-size: 18px;
    line-height: 1.8;
    color: #444;
    margin-bottom: 20px;
}

.highlight {
    color: #2f5d3a;
    font-weight: bold;
}

button {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 16px;
    border: none;
    background-color: #2f5d3a;
    color: white;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background-color: #244a2f;
    transform: scale(1.05);
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Before You Choose</h1>

    <p>
        Ahead of you are <span class="highlight">two doors</span>.
    </p>

    <p>
        One represents stability.  
        A life you manage.  
        A future you understand.
    </p>

    <p>
        The other represents risk.  
        Uncertainty.  
        A leap that could change everything.
    </p>

    <p>
        There is no right answer.
        <br>
        Only the answer that feels right to you.
    </p>

    <button onclick="goNext()">Continue</button>
</div>

<script>
function goNext() {
    window.location.href = "doors.html";
}
</script>

</body>
</html>
