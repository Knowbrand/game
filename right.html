<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Right Door</title>
<style>
:root {
  --bg-1: #f6f1e8;
  --bg-2: #ffffff;
  --card: #fffdf9;
  --card-border: #d8ccc0;
  --text: #2f2523;
  --muted: #6f625d;
  --accent: #6f8f72;
  --accent-dark: #58705a;
  --shadow: 0 22px 55px rgba(82, 62, 49, 0.12);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-family: "Segoe UI", Tahoma, sans-serif;
  color: var(--text);
  background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
}

.card {
  width: 100%;
  max-width: 760px;
  padding: 34px;
  border: 1px solid var(--card-border);
  border-radius: 28px;
  background: var(--card);
  box-shadow: var(--shadow);
  text-align: center;
}

.level-tag {
  display: inline-block;
  margin-bottom: 20px;
  padding: 8px 16px;
  border-radius: 999px;
  background: #eef3ee;
  color: var(--accent-dark);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

h1 {
  margin-bottom: 20px;
  font-size: clamp(2rem, 4vw, 2.9rem);
  line-height: 1.1;
  font-family: Georgia, "Times New Roman", serif;
}

.copy {
  color: var(--muted);
  font-size: 17px;
  line-height: 1.8;
}

.actions {
  margin-top: 28px;
}

button {
  padding: 14px 28px;
  border: 1px solid var(--accent);
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  background: var(--accent-dark);
}

@media (max-width: 640px) {
  .card {
    padding: 24px 18px;
    border-radius: 22px;
  }

  button {
    width: 100%;
  }
}
</style>
</head>
<body>
  <main class="card">
    <div class="level-tag">Right Door</div>
    <h1>You chose stability.</h1>

    <p class="copy">
      A life you are already managing.
      <br><br>
      Not perfect.
      <br>
      Not dramatic.
      <br><br>
      But peaceful.
      <br><br>
      And sometimes...
      <br>
      peace is the greatest victory.
    </p>

    <div class="actions">
      <button onclick="window.location.href='final.html'">Continue</button>
    </div>
  </main>
</body>
</html>
