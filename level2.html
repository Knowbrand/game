<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 2</title>
<style>
:root {
  --bg-1: #eef3ec;
  --bg-2: #dde8df;
  --card: #fffefb;
  --card-border: #bdd0c2;
  --text: #1f3a2f;
  --muted: #5d7468;
  --accent: #315847;
  --accent-soft: #edf5ef;
  --feedback-bg: #f4e7dc;
  --feedback-border: #e5c7ad;
  --shadow: 0 20px 50px rgba(36, 64, 50, 0.12);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font-family: "Segoe UI", Tahoma, sans-serif;
  color: var(--text);
  background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
}

.card {
  width: 100%;
  max-width: 720px;
  padding: 32px;
  border-radius: 28px;
  border: 1px solid var(--card-border);
  background: var(--card);
  box-shadow: var(--shadow);
  text-align: center;
}

.level-tag {
  display: inline-block;
  margin-bottom: 20px;
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.loading {
  padding: 18px 0;
}

.loading-text {
  margin-bottom: 18px;
  color: var(--muted);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.loading-bar {
  width: 100%;
  max-width: 320px;
  height: 10px;
  margin: 0 auto;
  border-radius: 999px;
  background: #e7efe9;
  overflow: hidden;
}

.loading-fill {
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #7ca08d, var(--accent));
  animation: load 2s ease forwards;
}

.question-section,
.exactly-section {
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.question-section.show,
.exactly-section.show {
  opacity: 1;
  transform: translateY(0);
}

.question {
  margin-bottom: 14px;
  font-size: clamp(2rem, 4vw, 3rem);
  line-height: 1.1;
  font-family: Georgia, "Times New Roman", serif;
}

.subtext {
  max-width: 540px;
  margin: 0 auto 26px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}

button {
  min-width: 140px;
  padding: 14px 26px;
  border: 1px solid var(--accent);
  border-radius: 999px;
  background: transparent;
  color: var(--accent);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
}

button:hover:not(:disabled) {
  transform: translateY(-2px);
  background: var(--accent);
  color: #fff;
}

button:disabled {
  opacity: 0.75;
  cursor: default;
}

.feedback {
  min-height: 28px;
  margin-top: 22px;
}

.feedback-box {
  display: inline-block;
  padding: 10px 16px;
  border: 1px solid var(--feedback-border);
  border-radius: 999px;
  background: var(--feedback-bg);
  color: var(--accent);
  font-size: 14px;
  font-weight: 600;
}

.line {
  margin-bottom: 14px;
  font-size: clamp(2rem, 4vw, 3rem);
  font-family: Georgia, "Times New Roman", serif;
}

.subline {
  margin-bottom: 28px;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.7;
}

@keyframes load {
  from {
    width: 0;
  }

  to {
    width: 100%;
  }
}

@media (max-width: 640px) {
  .card {
    padding: 24px 18px;
    border-radius: 22px;
  }

  .actions {
    flex-direction: column;
  }

  button {
    width: 100%;
  }
}
</style>
</head>
<body>
  <main class="card">
    <div class="level-tag">Level 2</div>

    <div class="loading" id="loading">
      <div class="loading-text">Loading next chapter...</div>
      <div class="loading-bar">
        <div class="loading-fill"></div>
      </div>
    </div>

    <section class="question-section" id="questionSection">
      <h1 class="question">Do you control everything in life?</h1>
      <p class="subtext">
        Think for a second before answering. Some things happen because we choose them, and some things happen because they choose us.
      </p>

      <div class="actions">
        <button id="yesButton" onclick="yesClicked()">Yes</button>
        <button id="noButton" onclick="noClicked()">No</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </section>

    <section class="exactly-section" id="exactlySection">
      <div class="line">Exactly.</div>
      <div class="subline">
        Some doors choose you.<br>
        Not the other way around.
      </div>
      <button onclick="goNext()">Next</button>
    </section>
  </main>

<script>
if (sessionStorage.getItem("nameSelected") !== "AK") {
  window.location.href = "index.html";
}

const loading = document.getElementById("loading");
const questionSection = document.getElementById("questionSection");
const exactlySection = document.getElementById("exactlySection");
const feedback = document.getElementById("feedback");
const yesButton = document.getElementById("yesButton");
const noButton = document.getElementById("noButton");

setTimeout(() => {
  loading.style.display = "none";
  questionSection.style.display = "block";

  requestAnimationFrame(() => {
    questionSection.classList.add("show");
  });
}, 2000);

function setFeedback(message) {
  feedback.innerHTML = message ? `<div class="feedback-box">${message}</div>` : "";
}

function yesClicked() {
  setFeedback("Think again.");
}

function noClicked() {
  yesButton.disabled = true;
  noButton.disabled = true;
  setFeedback("");
  questionSection.classList.remove("show");

  setTimeout(() => {
    questionSection.style.display = "none";
    exactlySection.style.display = "block";

    requestAnimationFrame(() => {
      exactlySection.classList.add("show");
    });
  }, 450);
}

function goNext() {
  document.body.style.opacity = "0";
  document.body.style.transition = "opacity 0.5s ease";

  setTimeout(() => {
    window.location.href = "level3.html";
  }, 550);
}
</script>
</body>
</html>
