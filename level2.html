<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 2</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  overflow: hidden;
}

/* Intro Screen */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 28px;
  letter-spacing: 2px;
  animation: fadeOut 4s forwards;
}

.intro span {
  opacity: 0;
  animation: textFade 2s forwards 1s;
}

@keyframes textFade {
  to { opacity: 1; }
}

@keyframes fadeOut {
  0% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

/* Main Game Content */
.game-content {
  display: none;
  height: 100vh;
  background: linear-gradient(135deg, #f5f1ea, #ffffff);
  justify-content: center;
  align-items: center;
}

.game-card {
  width: 90%;
  max-width: 700px;
  background: white;
  padding: 60px 40px;
  border-radius: 25px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.08);
  border: 2px solid #6f8f72;
  text-align: center;
}

.question {
  font-size: 26px;
  margin-bottom: 40px;
  color: #2e2e2e;
}

.option {
  display: block;
  width: 100%;
  margin: 15px 0;
  padding: 18px;
  border-radius: 15px;
  border: 2px solid #6f8f72;
  background: transparent;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.option:hover {
  background: #6f8f72;
  color: white;
}
</style>
</head>

<body>

<!-- Cinematic Intro -->
<div class="intro">
  <span>LEVEL 2</span>
</div>

<!-- Game Content -->
<div class="game-content" id="game">
  <div class="game-card">
    <div class="question">
      Do you control everything in life?
    </div>

    <button class="option" onclick="wrong()">Yes</button>
    <button class="option" onclick="nextLevel()">No</button>
  </div>
</div>

<script>
setTimeout(() => {
  document.querySelector('.intro').style.display = "none";
  document.getElementById('game').style.display = "flex";
  document.body.style.background = "#f5f1ea";
}, 4000);

function wrong() {
  alert("Think again.");
}

function nextLevel() {
  window.location.href = "level3.html";
}
</script>

</body>
</html>
