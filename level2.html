<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level 2</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f6f1e9; /* soft beige */
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

.container {
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1.5s ease forwards;
}

.line {
    font-size: 2rem;
    color: #1f4d3a; /* deep green */
    margin-bottom: 20px;
}

.subline {
    font-size: 1.2rem;
    color: #355f4b;
    margin-bottom: 40px;
    line-height: 1.6;
}

button {
    padding: 12px 30px;
    border: 2px solid #1f4d3a;
    background: transparent;
    color: #1f4d3a;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 30px;
    transition: 0.3s ease;
}

button:hover {
    background: #1f4d3a;
    color: #fff;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="line">Exactly.</div>
    <div class="subline">
        Some doors choose you.<br>
        Not the other way around.
    </div>
    <button onclick="goNext()">Next →</button>
</div>

<script>
function goNext() {
    window.location.href = "level3.html";
}
</script>

</body>
</html>
